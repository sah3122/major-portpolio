services:
  postgres:
    image: postgres:16-alpine
    container_name: nps-postgres
    environment:
      POSTGRES_DB: nps
      POSTGRES_USER: nps
      POSTGRES_PASSWORD: nps
    ports:
      - "5432:5432"
    volumes:
      - nps-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nps -d nps"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nps-pgdata:
